name: Security Dependency Scanning

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'pyproject.toml'
      - 'poetry.lock'
      - '.github/workflows/security-scan.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'pyproject.toml'
      - 'poetry.lock'
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root
      
      - name: Run Safety check
        id: safety
        run: |
          echo "## 🔒 Safety Vulnerability Check" >> $GITHUB_STEP_SUMMARY
          poetry run safety scan --target . --output json > safety-report.json
          poetry run safety scan --target . >> $GITHUB_STEP_SUMMARY
      
      - name: Run pip-audit
        id: pip-audit
        run: |
          echo "## 📦 Pip-Audit Check" >> $GITHUB_STEP_SUMMARY
          poetry run pip-audit --desc >> $GITHUB_STEP_SUMMARY
      
      - name: Run Bandit security check
        id: bandit
        run: |
          echo "## 🔐 Bandit Code Security Check" >> $GITHUB_STEP_SUMMARY
          poetry run bandit -r . -ll -f json -o bandit-report.json
          poetry run bandit -r . -ll >> $GITHUB_STEP_SUMMARY
      
      - name: Check Poetry lock
        id: pinning
        run: |
          echo "## 📌 Poetry Lock Check" >> $GITHUB_STEP_SUMMARY
          poetry run python scripts/security_scan.py --json
      
      - name: Upload security reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: security-reports-${{ matrix.python-version }}
          path: |
            safety-report.json
            bandit-report.json
      
      - name: Comment PR with security results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🔐 Security Scan Results\n\n';
            
            if (fs.existsSync('safety-report.json')) {
              const safetyReport = JSON.parse(fs.readFileSync('safety-report.json', 'utf8'));
              comment += `**Safety Check**: ${safetyReport.scanned_packages ? safetyReport.scanned_packages.length : 0} packages scanned\n`;
            }
            
            comment += '\n✅ Full security scan complete. See workflow logs for details.';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  dependency-update-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install poetry

      - name: Check for outdated packages
        id: outdated
        continue-on-error: true
        run: |
          poetry show --outdated
      
      - name: Create issue for outdated packages
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[Security] Scheduled dependency update check',
              body: 'Automated security scan detected outdated packages. Please review and update dependencies.',
              labels: ['security', 'dependencies']
            });
